global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: "prometheus"

    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node_exporter"

    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "cadvisor"

    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "mariadb" 
    static_configs: 
      - targets: ["mariadb_exporter:9104"]

  - job_name: "django"
    static_configs:
      - targets: ["django:80"]
